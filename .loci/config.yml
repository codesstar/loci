# Loci Configuration
# Modify these settings to customize your brain's behavior.

version: 1

language: mix              # en | zh | mix

persistence:
  mode: auto              # auto | manual
  notify: true            # show save notifications

wellbeing:
  enabled: false
  wind_down_time: "22:30"
  wake_up_time: "07:00"
  max_reminders: 2
